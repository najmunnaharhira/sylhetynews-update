openapi: 3.0.0
info:
  title: Sylhety News API
  version: 1.0.0
  description: API documentation for Sylhety News backend
servers:
  - url: http://localhost:5000/api
paths:
  /admin/login:
    post:
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
        '400':
          description: Validation error
        '401':
          description: Invalid credentials
  /password/request-reset:
    post:
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset link sent
  /admin-users/admins:
    get:
      summary: List all admins
      responses:
        '200':
          description: List of admins
    post:
      summary: Add admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Admin added
  /admin-users/admins/{email}:
    delete:
      summary: Remove admin
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Admin removed
